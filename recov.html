<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recovery</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body class="flex min-h-screen items-center justify-center md:py-56">
    <div
      class="md:h-115 flex bg-[#F9F9F9] md:w-150 w-72 flex-col rounded-2xl border"
    >
      <div class="flex justify-center items-center p-5">
        <img class="max-w-52" src="assets/modern-whale.png" alt="" />
      </div>
      <form class="mx-10 mt-10 gap-y-7 flex flex-col" action="">
        <input
          id="username"
          class="w-full px-3 rounded-2xl border"
          type="email"
          placeholder="input Email here.."
        />
        <div class="flex">
          <input
            id="verify"
            class="border px-3 w-full rounded-l-2xl"
            type="text"
            placeholder="verify code"
          />
          <button
            id="SEND"
            class="border border-black text-slate-900 w-40 rounded-r-2xl text-sm"
          >
            SEND CODE
          </button>
        </div>
        <input
          id="password"
          class="w-full px-3 rounded-2xl border"
          type="text"
          placeholder="NEW Pasword"
        />
      </form>

      <a class="md:ml-10 mt-5 text-blue-500 underline ml-12" href="index copy.html"
        >Back to signIn</a
      >
      <div class="flex md:justify-end mx-10 justify-center">
        <button
          class="bg-[#3F5F86] rounded-full w-36 text-white md:mt-10 m-5 hover:bg-red-300 hover:cursor-pointer"
          onclick="getVerif()"
        >
          Verify
        </button>
      </div>
    </div>
    <script src="verify.js"></script>
  </body>
</html>
