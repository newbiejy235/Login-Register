<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../src/output.css" rel="stylesheet" />
  </head>
  <body class="flex min-h-screen items-center justify-center bg-gray-100">
    <div
      class="md:flex absolute md:h-96 md:w-150 w-72 sm:w-96 overflow-hidden rounded-lg border border-black shadow-2xl"
    >
      <!-- Checkbox Hidden -->
      <input class="hidden peer" type="checkbox" id="menu-toggle" />

      <div
        class="md:hidden flex w-full h-auto bg-[#133B6C] rounded-b-3xl justify-center p-7 mb-5"
      >
        <img src="assets/modern-whale02-removebg.png" alt="" />
      </div>

      <!-- Background Image & Logo - SLIDE DARI KIRI KE KANAN -->
      <div
        class="md:block hidden md:h-1/1 md:w-60 bg-cover bg-center p-10 relative transition-transform duration-700 ease-in-out peer-checked:translate-x-90"
        style="background-image: url(&quot;assets/beach-waves (1).jpg&quot;)"
      >
        <div
          class="relative h-full flex flex-col justify-center items-center text-white text-center"
        >
          <!-- Letakkan logo atau teks di sini -->
          <img class="max-w-50" src="assets/modern-whale.png" alt="Logo" />
        </div>
      </div>

      <!-- Form - SLIDE KE KIRI -->
      <div
        class="flex flex-col md:p-10 p-4 justify-center bg-[#F9F9F9] md:transition-transform md:duration-700 md:ease-in-out md:peer-checked:-translate-x-60"
      >
        <input
          id="username"
          class="block md:w-70 w-60 border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500"
          type="email"
          placeholder="Masukan Email"
          required
        />
        <input
          id="password"
          class="block mt-10 md:w-70 w-60 border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500"
          type="password"
          placeholder="Masukan password"
          required
        />

        <label for="menu-toggle" id="Signup">
          <p
            id="toggleText"
            class="p-0 underline mt-5 text-blue-600 text-[12px] cursor-pointer"
            href="#"
          >
            Sign up
          </p>
        </label>

        <a
          class="mt-3 p-0 underline text-blue-600 text-[12px]"
          href="recov.html"
          >Recovery password</a
        >

        <button
          onclick="getDataIn()"
          id="mainButton"
          class="bg-[#3F5F86] text-white w-auto rounded-2xl mt-10 hover:bg-red-300 cursor-pointer"
        >
          Sign In
        </button>
        <button
          onclick="getDataUp()"
          id="secondButton"
          class="bg-[#3F5F86] text-white w-auto rounded-2xl mt-10 hover:bg-red-300 cursor-pointer"
        >
          Sign Up
        </button>
      </div>
    </div>

    <script src="signIn.js"></script>
    <script src="signUp.js"></script>
  </body>
</html>
